        <stop offset="100%" style="stop-color:#dc2626"/>
      </linearGradient>
    </defs>
    <circle cx="32" cy="32" r="30" fill="url(#grad-warrior)" opacity="0.2"/>
    <path d="M32 8 L36 24 L52 24 L40 34 L44 50 L32 40 L20 50 L24 34 L12 24 L28 24 Z" fill="url(#grad-warrior)"/>
    <path d="M32 18 L34 26 L42 26 L36 32 L38 40 L32 36 L26 40 L28 32 L22 26 L30 26 Z" fill="#fff" opacity="0.3"/>
  </symbol>

